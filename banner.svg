      <stop offset="0%" stop-color="#0d0221"/>
      <stop offset="50%" stop-color="#190a3e"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8e7bff"/>
      <stop offset="50%" stop-color="#c9a7ff"/>
      <stop offset="100%" stop-color="#7bd8ff"/>
    </linearGradient>
  </defs>

  <rect width="900" height="220" fill="url(#bgGrad)"/>


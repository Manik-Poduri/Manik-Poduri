  <circle cx="580" cy="70" r="1" fill="#ffffff"><animate attributeName="opacity" values="1;0.2;1" dur="3.4s" repeatCount="indefinite"/></circle>
  <circle cx="650" cy="25" r="1.6" fill="#ffffff"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.9s" repeatCount="indefinite"/></circle>
  <circle cx="720" cy="90" r="1.2" fill="#ffffff"><animate attributeName="opacity" values="0.6;1;0.6" dur="2.6s" repeatCount="indefinite"/></circle>
  <circle cx="800" cy="35" r="1" fill="#ffffff"><animate attributeName="opacity" values="1;0.1;1" dur="2.3s" repeatCount="indefinite"/></circle>

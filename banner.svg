  <circle cx="760" cy="180" r="1" fill="#ffffff"><animate attributeName="opacity" values="1;0.3;1" dur="2.8s" repeatCount="indefinite"/></circle>
  <circle cx="670" cy="160" r="1.5" fill="#ffffff"><animate attributeName="opacity" values="0.4;1;0.4" dur="3.3s" repeatCount="indefinite"/></circle>
